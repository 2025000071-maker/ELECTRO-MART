<!DOCTYPE html>
<html>

<head>

<title>Cart</title>

<style>

body{
font-family: Arial;
margin:0;
padding:0;
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
color:white;
padding:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

/* cart */

h2{
text-align:center;
margin-top:20px;
}

.cart-container{
width:80%;
margin:auto;
margin-top:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

button{
padding:5px 10px;
border:none;
background:red;
color:white;
border-radius:5px;
cursor:pointer;
}

.total{
text-align:center;
font-size:20px;
margin-top:20px;
font-weight:bold;
}

.checkout{
display:block;
margin:20px auto;
padding:10px 20px;
background:#111;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">⚡ Electro Mart</div>

<nav>

<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="categories.html">Categories</a>
<a href="cart.html">Cart</a>

</nav>

</header>


<h2>Your Shopping Cart</h2>


<div class="cart-container" id="cartItems">

</div>


<div class="total" id="totalPrice">

Total: ₹0

</div>


<button class="checkout">Checkout</button>



<script>

/* get cart data */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartContainer = document.getElementById("cartItems");

let total = 0;


/* show items */

cart.forEach((item,index)=>{

total += item.price;

cartContainer.innerHTML += `

<div class="cart-item">

<span>${item.name}</span>

<span>₹${item.price}</span>

<button onclick="removeItem(${index})">Remove</button>

</div>

`;

});


document.getElementById("totalPrice").innerText = "Total: ₹" + total;



/* remove item */

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart", JSON.stringify(cart));

location.reload();

}

</script>


</body>

</html>
